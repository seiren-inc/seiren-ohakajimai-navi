name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      # Build is validated by Vercel deployment (see Vercel Preview check).
      # Running next build here with a dummy DATABASE_URL causes failures
      # unrelated to code correctness. Vercel enforces build integrity.

      # --- SEO 静的検証 (DB不要) ---
      # T3-06: sitemap URL 整合チェック（PDF混入・重複・件数）
      - name: Verify SEO Sitemap (static)
        run: npx tsx scripts/verify_seo_sitemap.ts
        env:
          NEXT_PUBLIC_BASE_URL: "https://www.ohakajimai-navi.jp"

      # T3-07: title・description 重複チェック（静的ファイル解析）
      - name: Verify SEO Meta (static)
        run: npx tsx scripts/verify_seo_meta.ts

      # --- DB依存チェック（注意）---
      # verify_quality_gate.ts / verify_invariants.ts は本番DBへの接続が必要。
      # テスト専用 Supabase プロジェクトを用意した際に以下を解除する:
      # - run: npx tsx scripts/verify_invariants.ts
      # - run: npx tsx scripts/verify_quality_gate.ts
