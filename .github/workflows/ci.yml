name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          DIRECT_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      # [暫定措置] build ステップを GitHub CI から除外しています。
      # ビルド検証は Vercel Preview デプロイ（Vercel bot の check）で代替しています。
      # これは恒久対応ではありません。以下の条件が揃い次第、build を CI に戻してください:
      #
      #   1. DB不要ビルド
      #      build 時に DB クエリが実際に発火するページを dynamic 化・runtime 化すること。
      #      現在の要対応ファイル:
      #        - kaisoukyoka/page.tsx      → revalidate なし → SSG → findMany(全市区町村) が発火
      #        - gyoseishoshi/page.tsx     → revalidate あるが force-dynamic なし
      #        - gyoseishoshi/area/[prefecture]/page.tsx → 同上・47都道府県分
      #      対策: 上記に `export const dynamic = "force-dynamic"` または `revalidate` を追加する。
      #      （Prisma Client の import 自体は問題なし。query の実行有無が管理対象）
      #
      #   2. env の安全な CI 注入
      #      DB不要構成が実現できれば build 時の DATABASE_URL 接続は不要。
      #      GitHub Actions Secrets に DATABASE_URL / DIRECT_URL / NEXT_PUBLIC_BASE_URL を登録し、
      #      以下ステップを追加:
      #        - name: Build
      #          run: npm run build
      #          env:
      #            DATABASE_URL: ${{ secrets.DATABASE_URL }}
      #            DIRECT_URL: ${{ secrets.DIRECT_URL }}
      #            NEXT_PUBLIC_BASE_URL: "https://www.ohakajimai-navi.jp"
      #
      #   3. prisma generate の安定化
      #      npm ci 後に postinstall の prisma generate が完走すること。
      #      build フェーズで不要な generate 再実行が起きないことを確認すること。
      #
      # 上記が整ったら next PR でこのコメントブロックを "Build" ステップに差し替えてください。

      # --- SEO 静的検証 (DB不要) ---
      # T3-06: sitemap URL 整合チェック（PDF混入・重複・件数）
      - name: Verify SEO Sitemap (static)
        run: npx tsx scripts/verify_seo_sitemap.ts
        env:
          NEXT_PUBLIC_BASE_URL: "https://www.ohakajimai-navi.jp"

      # T3-07: title・description 重複チェック（静的ファイル解析）
      - name: Verify SEO Meta (static)
        run: npx tsx scripts/verify_seo_meta.ts

      # --- DB依存チェック（注意）---
      # verify_quality_gate.ts / verify_invariants.ts は本番DBへの接続が必要。
      # テスト専用 Supabase プロジェクトを用意した際に以下を解除する:
      # - run: npx tsx scripts/verify_invariants.ts
      # - run: npx tsx scripts/verify_quality_gate.ts
