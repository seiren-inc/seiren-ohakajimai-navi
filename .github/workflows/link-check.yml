name: 自治体リンク自動検査

on:
  # 毎週月曜日09:00 JST（00:00 UTC）に実行
  schedule:
    - cron: '0 0 * * 1'
  # 手動実行も可能にする
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージのインストール
        run: npm ci

      - name: Prisma クライアント生成
        run: npx prisma generate

      - name: 自治体リンク検査スクリプト実行
        run: npx tsx scripts/check-links.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: レポートをArtifactsに保存（失敗時も保存）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report-${{ github.run_id }}
          path: public/link-check-report.json
          retention-days: 90

      - name: 失敗時の通知メッセージ
        if: failure()
        run: |
          echo "::error title=リンク検査で問題が検出されました::自治体URLのリンク切れが発生しています。管理画面の「リンク検査」ページでエラーの詳細を確認してください。"
